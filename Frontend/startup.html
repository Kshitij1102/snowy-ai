<!DOCTYPE html>
<html>

<head>

<title>SNOWY Initialization</title>

<style>

body{

    margin:0;
    background:black;
    color:#00ffff;

    font-family:Arial,sans-serif;

    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    height:100vh;

    flex-direction:column;

}

h1{

    font-size:55px;

    letter-spacing:12px;

    text-shadow:
    0 0 20px #00ffff,
    0 0 60px #00ffff;

}

#status{

    margin-top:20px;

    font-size:18px;

    opacity:0.8;

}

.scan{

    width:320px;
    height:320px;

    border-radius:50%;

    border:2px solid #00ffff;

    margin-top:40px;

    position:relative;

    overflow:hidden;

    box-shadow:
    0 0 40px #00ffff;

}

.scan::before{

    content:"";

    position:absolute;

    width:100%;
    height:10px;

    background:#00ffff;

    animation:scan 2s linear infinite;

    box-shadow:
    0 0 20px #00ffff;

}

@keyframes scan{

    0%{
        top:0;
    }

    100%{
        top:100%;
    }

}

.hidden{

    display:none;

}

</style>

</head>

<body>

<h1>SNOWY</h1>

<div id="status">
Initializing SNOWY systems...
</div>

<div class="scan"></div>

<script>

const statusText =
document.getElementById("status");

setTimeout(()=>{

    statusText.innerText =
    "Facial identity scan initiated...";

},3000);

setTimeout(()=>{

    statusText.innerText =
    "Voice authorization required...";

},6000);

setTimeout(()=>{

    statusText.innerText =
    "Identity confirmed.";

},9000);

setTimeout(()=>{

    window.location.href =
    "index.html";

},12000);

</script>

</body>
</html>
