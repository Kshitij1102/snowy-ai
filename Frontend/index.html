<!DOCTYPE html>
<html lang="en">

<head>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#00ffff">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SNOWY Neural Core</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="dashboard">

<div class="panel left-panel">

<div class="logo">
SNOWY
</div>

<div class="subtitle">
Smart Neural Operating Web Yield
</div>

<div class="divider"></div>

<div class="system-card">
<h3>AI STATUS</h3>
<p>ONLINE</p>
</div>

<div class="system-card">
<h3>VOICE ENGINE</h3>
<p>ACTIVE</p>
</div>

<div class="system-card">
<h3>MEMORY CORE</h3>
<p>SYNCHRONIZED</p>
</div>

<div class="system-card">
<h3>EMOTION ENGINE</h3>
<p>ADAPTIVE</p>
</div>

<div class="system-card">
<h3>MODEL</h3>
<p>LLAMA 3</p>
</div>

</div>

<div class="center-panel">

<div class="hologram-core" id="core">

<div class="energy-ring energy-ring1"></div>
<div class="energy-ring energy-ring2"></div>
<div class="energy-ring energy-ring3"></div>

<div class="hex-core">

<div class="hex-layer hex1"></div>
<div class="hex-layer hex2"></div>
<div class="hex-layer hex3"></div>

<div class="neural-symbol">

<div class="symbol-line line1"></div>
<div class="symbol-line line2"></div>
<div class="symbol-line line3"></div>

</div>

</div>

<div class="particle particle1"></div>
<div class="particle particle2"></div>
<div class="particle particle3"></div>
<div class="particle particle4"></div>

</div>

<div class="wave-container">

<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>

</div>

<div class="status" id="status">
SYSTEM READY
</div>

<div class="chat-input-container">

<input
type="text"
id="chatInput"
placeholder="Type a command for SNOWY..."
autocomplete="off"
/>

<button id="sendBtn">
SEND
</button>

</div>

<button class="activate-btn" onclick="startSnowy()">
ACTIVATE SNOWY
</button>

</div>

<div class="panel right-panel">

<div class="logs-title">
SYSTEM LOGS
</div>

<div class="log-box" id="logs">

<div class="log">
[SYSTEM] SNOWY Neural Core initialized...
</div>

</div>

</div>

</div>

<script src="config.js"></script>

<script src="app.js"></script>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
